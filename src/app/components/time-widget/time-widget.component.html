<div class="time-widget glass-panel glow-border">
  <div class="widget-header">
    <svg
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="#00e5ff"
      stroke-width="2"
    >
      <circle cx="12" cy="12" r="10" />
      <path d="M12 6v6l4 2" stroke-linecap="round" />
    </svg>
    <span class="widget-title">TIME MANAGER</span>
  </div>

  <div class="time-main">
    <div class="current-time">{{ currentTime }}</div>
    <div class="door-prompt">
      <span class="door-label">Be at the door at</span>
      <span class="door-time glow-text">{{ doorTime }}</span>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="progressPercent"></div>
    </div>
    <div class="progress-meta">
      <span class="minutes-left">{{ minutesLeft }} min remaining</span>
      <span class="progress-pct">{{ progressPercent | number: "1.0-0" }}%</span>
    </div>
  </div>

  <div class="time-details">
    <div class="detail-row">
      <span class="detail-label">Walk to stop</span>
      <span class="detail-value">5 min</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Wait time</span>
      <span class="detail-value">2 min</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Travel time</span>
      <span class="detail-value">11 min</span>
    </div>
  </div>
</div>
