<header class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <span class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#00e5ff" stroke-width="2" />
          <path
            d="M12 6v6l4 2"
            stroke="#00e5ff"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </span>
      <span class="logo-text">INOVAPP</span>
    </div>
  </div>

  <div class="topbar-center">
    <div class="search-bar">
      <svg
        class="search-icon"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
      >
        <circle cx="11" cy="11" r="8" stroke="#8892b0" stroke-width="2" />
        <path
          d="m21 21-4.35-4.35"
          stroke="#8892b0"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
      <span class="search-text">Search destination...</span>
    </div>
    <div class="location-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#00e5ff">
        <path
          d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"
        />
      </svg>
      <span>Pl. de Ntra. Sra. del Pilar</span>
    </div>
  </div>

  <div class="topbar-right">
    <div class="weather-info">
      <span class="weather-icon">{{ weatherIcon }}</span>
      <span class="temp">{{ currentTemp }}</span>
    </div>
    <div class="time-display">{{ currentTime }}</div>
  </div>
</header>
